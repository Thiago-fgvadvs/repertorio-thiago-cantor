<style>
  html,body,#root{height:100%}
  body{margin:0;background:#0c1622;color:#eef5ff;font-family:system-ui,sans-serif}
  .boot{height:100%;display:flex;align-items:center;justify-content:center;color:#9db4d4}
  .sticky.top-0{padding-top:calc(1rem + env(safe-area-inset-top)) !important}
  .fixed.inset-0{padding-top:env(safe-area-inset-top)}
  .fixed.bottom-0{padding-bottom:env(safe-area-inset-bottom)}
</style>
</head>
<body>
<div id="root"><div class="boot">Carregando o repertório…</div></div>
<script>
window.__bootFail=function(){var r=document.getElementById('root');if(!r||window.__booted)return;r.innerHTML='<div style="padding:30px 20px;text-align:center;font-family:system-ui,sans-serif"><p style="color:#ffd24d;font-weight:700;font-size:17px;margin:0 0 8px">Não consegui carregar o app</p><p style="color:#9db4d4;font-size:14px;line-height:1.5;margin:0 0 6px">Verifique sua conexão e recarregue a página.</p><p style="color:#9db4d4;font-size:13px;line-height:1.5;margin:0">Se abriu pelo navegador interno do WhatsApp/Instagram, toque em ••• e escolha <b>Abrir no Chrome</b> ou <b>Safari</b>.</p></div>';};
window.addEventListener('error',function(e){if(!window.__booted&&e&&String(e.filename||'').indexOf('/vendor/')>=0)window.__bootFail();},true);
</script>
<script src="vendor/react.production.min.js?v=1" onerror="window.__bootFail()"></script>
<script src="vendor/react-dom.production.min.js?v=1" onerror="window.__bootFail()"></script>
<script src="vendor/supabase.js?v=1" onerror="window.__bootFail()"></script>
<script src="config.js?v=1"></script>
<script src="app.js?v=13"></script>
<script>setTimeout(function(){if(document.querySelector('#root .boot'))window.__bootFail();},9000);</script>
</body>
</html>
